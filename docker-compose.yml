services:
  web:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_BASE_URL: http://localhost:3088
      NEXT_PUBLIC_APP_BASE_URL: http://localhost:3088
      NEXTAUTH_URL: http://localhost:3088
      NEXTAUTH_SECRET: replace-with-a-long-random-development-secret
      DATABASE_URL: postgresql://zuidlaren:zuidlaren@postgres:5432/zuidlaren_agenda?schema=public
    ports:
      - "3088:3000"
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zuidlaren_agenda
      POSTGRES_USER: zuidlaren
      POSTGRES_PASSWORD: zuidlaren
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zuidlaren -d zuidlaren_agenda"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
