services:
  web:
    build:
      context: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      NODE_ENV: production
      PORT: ${CONTAINER_PORT:-3000}
      DATABASE_URL: ${DOCKER_DATABASE_URL:-postgresql://zuidlaren:zuidlaren@postgres:5432/zuidlaren_agenda?schema=public}
    ports:
      - "${APP_PORT:-3088}:${CONTAINER_PORT:-3000}"
    volumes:
      - media-uploads:/app/public/uploads
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:' + (process.env.PORT || 3000) + '/api/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 5
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zuidlaren_agenda
      POSTGRES_USER: zuidlaren
      POSTGRES_PASSWORD: zuidlaren
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zuidlaren -d zuidlaren_agenda"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres-data:
  media-uploads:
